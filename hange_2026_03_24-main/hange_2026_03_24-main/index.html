
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HANGAICLOUD | Global Market Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');
      
      :root {
        --bg-body: #000000;
        --bg-card: #161617;
        --bg-card-hover: #1d1d1f;
        --text-primary: #f5f5f7;
        --text-secondary: #86868b;
        --accent: #2997ff;
        --accent-glow: rgba(41, 151, 255, 0.3);
        --glass: rgba(22, 22, 23, 0.7);
        --border: rgba(255, 255, 255, 0.08);
      }

      body {
        margin: 0;
        padding: 0;
        font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
        background-color: var(--bg-body);
        color: var(--text-primary);
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Bento Grid System */
      .bento-grid {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 24px;
      }

      .bento-card {
        background-color: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 28px;
        transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        overflow: hidden;
        position: relative;
      }

      .bento-card::before {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at top left, rgba(255,255,255,0.03), transparent);
        pointer-events: none;
      }

      .bento-card:hover {
        background-color: var(--bg-card-hover);
        border-color: rgba(255, 255, 255, 0.15);
        transform: translateY(-2px);
        box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      }

      /* Glassmorphism */
      .glass-panel {
        background: var(--glass);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--border);
      }

      /* Typography */
      .text-display {
        font-size: clamp(2rem, 5vw, 4rem);
        line-height: 1.1;
        font-weight: 700;
        letter-spacing: -0.04em;
      }

      .text-mono {
        font-family: 'JetBrains Mono', monospace;
        letter-spacing: -0.02em;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.2);
      }

      /* Animations */
      @keyframes reveal {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .animate-reveal {
        animation: reveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
    </style>
